name: CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: build & doc
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master 2026-07-15
        with:
          toolchain: stable
      - run: cargo build --all-targets --locked
      # Rustdoc warnings fail here rather than on docs.rs after publish
      # (missing docs are already a compile error via #![deny(missing_docs)]).
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --locked

  test:
    name: test (coverage)
    # build & doc is quick; no point spinning up the coverage suite if the
    # code doesn't compile or document cleanly.
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master 2026-07-15
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-llvm-cov
      - name: Tests
        run: cargo llvm-cov --locked --lcov --output-path coverage.lcov
      - name: Coverage summary
        run: cargo llvm-cov report --summary-only
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.lcov
          fail_ci_if_error: false
