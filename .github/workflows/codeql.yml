name: CodeQL

on:
  # Called by the Pipeline orchestrator on push/PR; runs standalone on the
  # weekly cron so scans keep landing between commits.
  workflow_call:
  schedule:
    - cron: '45 4 * * 2'

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (rust)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: rust
          # The Rust extractor is source-based; no build is required.
          build-mode: none
          queries: security-and-quality
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:rust"
