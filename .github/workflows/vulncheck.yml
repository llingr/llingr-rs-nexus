name: Vulncheck

on:
  # Called by the Pipeline orchestrator on push/PR; runs standalone on the
  # weekly cron so scans keep landing between commits.
  workflow_call:
  schedule:
    - cron: '45 5 * * 2'

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master 2026-07-15
        with:
          toolchain: stable
      # Pinned tool version; the RustSec advisory database is still fetched
      # fresh at scan time, so detection stays current.
      - run: cargo install cargo-audit --locked --version 0.22.2
      - run: cargo audit
