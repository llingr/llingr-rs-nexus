name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  build:
    # trusted builder: signs attestations, cannot write to the repo
    uses: ./.github/workflows/release-build.yml
    permissions:
      contents: read
      id-token: write
      attestations: write

  publish:
    # publisher: creates the release, cannot sign attestations
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          -R "${GITHUB_REPOSITORY}"
          --verify-tag
          --title "${GITHUB_REF_NAME}"
          --generate-notes
          "llingr-rs-nexus-${GITHUB_REF_NAME}.tar.gz"
          "llingr-rs-nexus-${GITHUB_REF_NAME}.tar.gz.sigstore"
          "llingr-rs-nexus-${GITHUB_REF_NAME}.cdx.json"
          "llingr-rs-nexus-${GITHUB_REF_NAME}.spdx.json"
          llingr-nexus-*.crate

  publish-crate:
    # crates.io publish via Trusted Publishing (OIDC): no long-lived API
    # token; crates.io mints a short-lived token for this repo + workflow +
    # environment (one-time publisher setup on crates.io). Gated on the
    # GitHub release: the irreversible (yank-only) crates.io upload happens
    # last, only for a tag whose release built, attested, and published
    # cleanly.
    #
    # DISABLED (skipped, never failed) until the one-time bootstrap is done:
    # crates.io requires a crate's first release to be published manually
    # before a trusted publisher can be configured. Once the crate exists
    # and the publisher is set up, delete the `if: false` line below.
    name: publish to crates.io
    if: false
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # crates.io publishes are irreversible (yank-only): refuse to proceed
      # when the pushed tag does not match the crate version.
      - name: Check crate version matches tag
        run: |
          # pkgid yields "...#name@x.y.z" (or "...#x.y.z" when the package
          # and directory names match); the trailing cut handles both.
          crate_version=$(cargo pkgid | cut -d'#' -f2 | cut -d'@' -f2)
          test "v${crate_version}" = "${GITHUB_REF_NAME}" || {
            echo "crate version ${crate_version} does not match tag ${GITHUB_REF_NAME}"
            exit 1
          }

      # Full packaging + verification build BEFORE any token is minted.
      - name: Publish dry run
        run: cargo publish --dry-run --locked

      - name: Authenticate with crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
